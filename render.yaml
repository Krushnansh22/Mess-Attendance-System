services:
  - type: web
    name: mess-attendance
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: MESS_QR_SECRET_KEY
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PASSCODE
        sync: false
      - key: GPS_ENABLED
        value: "false"
      - key: MESS_LATITUDE
        value: "0"
      - key: MESS_LONGITUDE
        value: "0"
      - key: MESS_RADIUS_METRES
        value: "50"
